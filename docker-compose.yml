version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: examendu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: examendu
      POSTGRES_USER: examendu
      POSTGRES_PASSWORD: examendu123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
